<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Login — V&M Projects</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary:       #F27405; /* Industrial Orange */
            --primary-dark:  #CC6104;
            --primary-glow:  rgba(242, 116, 5, 0.25);
            --bg-deep:       #0A0A0A;
            --bg-panel:      #1A1A1A;
            --glass-bg:      rgba(26, 26, 26, 0.9);
            --glass-border:  rgba(255, 255, 255, 0.08);
            --text-primary:  #FFFFFF;
            --text-muted:    rgba(255, 255, 255, 0.6);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-deep);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            color: var(--text-primary);
            padding: 2rem 1rem;
            position: relative;
            overflow: hidden;
        }

        /* Ambient background */
        body::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at center, #1A1A1A 0%, #0A0A0A 100%);
            z-index: -1;
        }

        .login-orb {
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            top: -150px; left: -150px;
            pointer-events: none;
            opacity: 0.5;
        }

        .login-card {
            background: var(--bg-panel);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3.5rem 3rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        .login-brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            color: var(--text-primary);
            text-decoration: none;
            display: block;
            text-align: center;
            margin-bottom: 0.2rem;
            text-transform: uppercase;
        }
        .login-brand span { color: var(--primary); }

        .login-eyebrow {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--primary);
            text-align: center;
            display: block;
            margin-bottom: 2.5rem;
        }

        .form-label {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            display: block;
            font-weight: 600;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 8px !important;
            color: var(--text-primary) !important;
            padding: 0.9rem 1.1rem;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.25); }
        .form-control:focus {
            outline: none !important;
            box-shadow: 0 0 0 4px var(--primary-glow) !important;
            border-color: var(--primary) !important;
            background: rgba(242, 116, 5, 0.04) !important;
        }

        .input-icon-wrap { position: relative; }
        .input-icon-wrap .bi-person {
            position: absolute;
            right: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            pointer-events: none;
        }
        .input-icon-wrap .form-control { padding-right: 3rem; }

        .btn-login {
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 1rem 2rem;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px var(--primary-glow);
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px var(--primary-glow);
        }

        .error-alert {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.2);
            border-radius: 8px;
            padding: 0.8rem 1rem;
            font-size: 0.85rem;
            color: #ff8585;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .login-divider {
            border-color: var(--glass-border);
            margin: 2.5rem 0 1.5rem;
        }

        .back-link {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: color 0.2s ease;
        }
        .back-link:hover { color: var(--primary); }

        .show-pass-btn {
            position: absolute;
            right: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.3rem;
            font-size: 1.1rem;
            transition: color 0.2s;
        }
        .show-pass-btn:hover { color: var(--primary); }
    </style>
</head>
<body>

<div class="login-orb"></div>

<div class="login-card">

    <a href="{{ url_for('home') }}" class="login-brand">V&M <span>PROJECTS</span></a>
    <span class="login-eyebrow">Secure Admin Access</span>

    {% if error %}
    <div class="error-alert">
        <i class="bi bi-exclamation-circle-fill"></i>
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin.login') }}">

        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <div class="input-icon-wrap">
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="admin" autocomplete="username" required>
                <i class="bi bi-person"></i>
            </div>
        </div>

        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-icon-wrap" style="position:relative;">
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="••••••••" autocomplete="current-password" required>
                <button type="button" class="show-pass-btn" id="togglePass" title="Show password">
                    <i class="bi bi-eye" id="toggleIcon"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn-login">
            <i class="bi bi-shield-lock-fill"></i> Sign In
        </button>

    </form>

    <hr class="login-divider">

    <a href="{{ url_for('home') }}" class="back-link">
        <i class="bi bi-arrow-left"></i> Back to Storefront
    </a>

</div>

<script>
    const toggleBtn  = document.getElementById('togglePass');
    const passInput  = document.getElementById('password');
    const toggleIcon = document.getElementById('toggleIcon');

    toggleBtn.addEventListener('click', () => {
        const isPass = passInput.type === 'password';
        passInput.type      = isPass ? 'text' : 'password';
        toggleIcon.className = isPass ? 'bi bi-eye-slash' : 'bi bi-eye';
    });
</script>

</body>
</html>
