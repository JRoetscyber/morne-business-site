<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Sign In — Delcon</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Bootstrap 5.3 -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Delcon CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>

<body>

<div class="admin-login-page">
  <div class="admin-login-card">

    <!-- Brand -->
    <div class="text-center mb-1">
      <div class="admin-login-brand">DEL<span>CON</span></div>
      <div class="admin-login-sub">Secure Admin Access</div>
    </div>

    <hr class="admin-login-divider">

    <!-- Error alert -->
    {% if error %}
      <div class="alert alert-danger d-flex align-items-center gap-2 mb-4" role="alert">
        <i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>
        <span>{{ error }}</span>
      </div>
    {% endif %}

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} d-flex align-items-center gap-2 mb-4" role="alert">
          <i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>
          <span>{{ message }}</span>
        </div>
      {% endfor %}
    {% endwith %}

    <!-- Login form -->
    <form method="POST" action="{{ url_for('admin.login') }}" novalidate>
      {# Add {{ csrf_token() }} once Flask-WTF is configured #}

      <div class="mb-3">
        <label for="username" class="admin-form-label">Username</label>
        <input type="text"
               class="admin-form-control"
               id="username"
               name="username"
               placeholder="admin"
               autocomplete="username"
               required
               autofocus>
      </div>

      <div class="mb-4">
        <label for="password" class="admin-form-label">Password</label>
        <div style="position:relative;">
          <input type="password"
                 class="admin-form-control"
                 id="password"
                 name="password"
                 placeholder="••••••••"
                 autocomplete="current-password"
                 required
                 style="padding-right:3rem;">
          <button type="button"
                  id="togglePass"
                  title="Toggle password visibility"
                  style="position:absolute; right:0.9rem; top:50%; transform:translateY(-50%);
                         background:none; border:none; color:var(--dc-text-subtle);
                         cursor:pointer; padding:0.3rem; font-size:1.1rem;
                         transition:color var(--dc-ease);"
                  onmouseover="this.style.color='var(--dc-orange)'"
                  onmouseout="this.style.color='var(--dc-text-subtle)'">
            <i class="bi bi-eye" id="toggleIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-dc-primary w-100 btn-cta"
              style="margin-top:0.25rem;">
        <i class="bi bi-shield-lock-fill me-2"></i>Sign In
      </button>

    </form>

    <hr class="admin-login-divider">

    <a href="{{ url_for('main.index') }}"
       style="display:flex; align-items:center; justify-content:center; gap:0.5rem;
              font-size:0.8rem; color:var(--dc-text-subtle); text-decoration:none;
              transition:color var(--dc-ease);"
       onmouseover="this.style.color='var(--dc-orange)'"
       onmouseout="this.style.color='var(--dc-text-subtle)'">
      <i class="bi bi-arrow-left"></i> Back to Public Site
    </a>

  </div>
</div>

<!-- Bootstrap 5.3 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmidXmgI/BFbRqmXKQ6/0EqOblCQ"
        crossorigin="anonymous"></script>

<script>
  (function () {
    var btn  = document.getElementById('togglePass');
    var inp  = document.getElementById('password');
    var icon = document.getElementById('toggleIcon');
    btn.addEventListener('click', function () {
      var isPass = inp.type === 'password';
      inp.type     = isPass ? 'text' : 'password';
      icon.className = isPass ? 'bi bi-eye-slash' : 'bi bi-eye';
    });
  })();
</script>

</body>
</html>
